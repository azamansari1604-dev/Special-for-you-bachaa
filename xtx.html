<!-- 🎆 Fireworks + Confetti + Final Surprise -->

<canvas id="fireworks"></canvas>

<style>
#fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.finalBtn{
padding:15px 35px;
background:#fff;
color:#ff2d55;
border:none;
border-radius:40px;
font-size:20px;
font-weight:bold;
margin:25px;
cursor:pointer;
transition:.3s;
}

.finalBtn:hover{
transform:scale(1.08);
}

#finalMessage{
display:none;
margin:30px;
padding:25px;
font-size:22px;
line-height:1.8;
background:rgba(255,255,255,.18);
border-radius:20px;
backdrop-filter:blur(10px);
}
</style>

<button class="finalBtn" onclick="showLove()">
❤️ Final Surprise ❤️
</button>

<div id="finalMessage">
<h1>🎉 Happy Birthday Sadiya 🎉</h1>

<p>

May Allah bless you with happiness,
good health and endless smiles.

Tumhari har khushi meri dua hai.

Aaj ka din sirf tumhare liye special hai.

Stay Happy, Stay Blessed ❤️

<br><br>

Forever Yours,<br>
<b>Aazm ❤️</b>

</p>

</div>

<script>
function showLove(){

document.getElementById("finalMessage").style.display="block";

for(let i=0;i<120;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="fixed";

heart.style.left=Math.random()*100+"vw";

heart.style.top=Math.random()*100+"vh";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.transition="4s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.style.transform="translateY(-200px) scale(2)";

heart.style.opacity="0";

},100);

setTimeout(()=>{

heart.remove();

},4000);

}

alert("🎂 Happy Birthday My Love ❤️");
}
  </script>
