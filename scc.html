<button onclick="playMusic()" style="
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#fff;
color:#ff4d6d;
font-weight:bold;
margin:20px;">
🎵 Play Our Song
</button>

<audio id="song" controls style="display:none;">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
  document.getElementById("song").play();
}

let images=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg"
];

let index=0;
const pic=document.querySelector("img");

setInterval(()=>{
index=(index+1)%images.length;
pic.src=images[index];
},3000);
</script>
